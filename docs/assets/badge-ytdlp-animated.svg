<svg xmlns="http://www.w3.org/2000/svg" width="174" height="28" viewBox="0 0 174 28" role="img" aria-labelledby="title desc">
  <title id="title">Powered by yt-dlp animated badge</title>
  <desc id="desc">Animated local README badge using the YouTube icon from Simple Icons.</desc>
  <defs>
    <linearGradient id="badgeBg" x1="0" x2="1">
      <stop offset="0%" stop-color="#20252e"/>
      <stop offset="100%" stop-color="#7a1616"/>
    </linearGradient>
  </defs>
  <rect width="174" height="28" rx="6" fill="url(#badgeBg)"/>
  <rect x="0.5" y="0.5" width="173" height="27" rx="5.5" fill="none" stroke="#ffffff" stroke-opacity="0.16"/>
  <g transform="translate(10 7) scale(.58)">
    <!-- YouTube icon path from Simple Icons: https://simpleicons.org/icons/youtube.svg -->
    <path fill="#ffffff" d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z">
      <animate attributeName="opacity" values="1;0.5;1" dur="1.8s" repeatCount="indefinite"/>
    </path>
  </g>
  <text x="34" y="18" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="700" fill="#ffffff">powered by</text>
  <text x="110" y="18" font-family="Inter,Arial,sans-serif" font-size="12" fill="#ffd7d7">YT-DLP</text>
  <rect x="-34" y="0" width="24" height="28" fill="#ffffff" opacity="0.14" transform="skewX(-18)">
    <animate attributeName="x" values="-34;190" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
