<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Transcripts animated logo</title>
  <desc id="desc">Animated microphone and subtitle wave mark for Transcripts.</desc>
  <rect width="160" height="160" rx="34" fill="#0B1020"/>
  <rect x="61" y="30" width="38" height="70" rx="19" fill="#F8FAFC" stroke="#60A5FA" stroke-width="5"/>
  <path d="M49 72c0 20 12 34 31 34s31-14 31-34" stroke="#93C5FD" stroke-width="7" stroke-linecap="round"/>
  <path d="M80 106v20" stroke="#93C5FD" stroke-width="7" stroke-linecap="round"/>
  <path d="M61 128h38" stroke="#93C5FD" stroke-width="7" stroke-linecap="round"/>
  <g stroke="#F43F5E" stroke-width="5" stroke-linecap="round">
    <path d="M32 58c7-8 15-8 22 0">
