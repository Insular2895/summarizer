paths:
  input_dir: "input"
  output_dir: "output"
  cache_dir: "cache"
  prompts_dir: "prompts"

retention:
  keep_cache_default: false
  ask_before_delete_output: true
  delete_input_after_run: false

youtube:
  preferred_subtitles:
    - "fr"
    - "en"
  fallback_auto_subtitles: true

pdf:
  default_engine: "auto"
  fallback_engine: "marker"
  max_single_request_tokens: 160000
  smart_engine:
    simple_text_engine: "text"
    scanned_book_engine: "ocrmypdf"
    complex_engine: "mineru"
    fallback_engine: "marker"
  evidence:
    enabled: true
    dpi: 350
    include_context: false
    visual_review_enabled: true
    max_visual_calls_per_document: 40
    ocr_min_native_characters: 120

graphipy:
  enabled_by_default: true
  output_dir: "output/graphipy_ready"

usage:
  log_path: "cache/jobs/gemini_usage.jsonl"
  monthly_budget_usd: null
  # Fill this only if you want local cost estimates.
  # Prices change over time, so they are intentionally not hardcoded here.
  # Example:
  # model_prices_per_1m:
  #   gemini-2.5-flash:
  #     input: 0.0
  #     output: 0.0
  model_prices_per_1m: {}
